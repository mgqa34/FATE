matrix:
  include:
    # works on Precise and Trusty
    - os: linux
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - g++-4.9
      env:
         - MATRIX_EVAL="CC=gcc-4.9 && CXX=g++-4.9"

    # works on Precise and Trusty
    - os: linux
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - g++-5
      env:
         - MATRIX_EVAL="CC=gcc-5 && CXX=g++-5"

    # works on Precise and Trusty
    - os: linux
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - g++-6
      env:
        - MATRIX_EVAL="CC=gcc-6 && CXX=g++-6"

    # works on Precise and Trusty
    - os: linux
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - g++-7
      env:
        - MATRIX_EVAL="CC=gcc-7 && CXX=g++-7"

before_install:
    - eval "${MATRIX_EVAL}"
    - wget https://www.mpfr.org/mpfr-current/mpfr-4.0.2.zip
    - unzip mpfr-4.0.2.zip
    - cd mpfr-4.0.2/
    - mkdir build
    - cd build/
    - ../configure --prefix=$(pwd)/..
    - make -j12
    - sudo make install
    - cd ~/
language: python
python:
  - "3.6"
sudo: required
install:
  - pip install -r requirements.txt
  - pip install pytest pytest-cov coverage
before script:
  - export PYTHONPATH=$PYTHONPATH:$(pwd)
script:
  - py.test --cov=./
