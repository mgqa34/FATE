sudo: required
language: generic

cache:
  directories:
    - $HOME/.ccache
notifications:
  slack:
    on_success: never
    on_failure : never

matrix:
  include:
    - os: linux
      dist: xenial
      language: python
      python: 3.6

install:
  - |
    export PATH="/usr/lib/ccache:$PATH"
    ccache -M 256M && ccache -s
    sudo apt-get install libgmp-dev libmpfr-dev libmpfi-dev libmpc-dev texlive texlive-latex-extra latexmk
    pip install Cython --verbose --disable-pip-version-check
    python setup.py sdist
    pip install dist/gmpy2-*.tar.gz
    cat requirements.txt | xargs -n 1 pip install
    pip install pytest pytest-cov coverage
    pip install codecov
    pip install nose
    pip install sphinx
before script:
  - export PYTHONPATH=$PYTHONPATH:$HOME
script:
  -  eggroll_git_url=`grep -A 3 '"eggroll"' .gitmodules | grep 'url' | awk -F '= ' '{print $2}'`
  -  eggroll_git_branch=`grep -A 3 '"eggroll"' .gitmodules | grep 'branch' | awk -F '= ' '{print $2}'`
  -  echo "[INFO] Git clone eggroll submodule source code from ${eggroll_git_url} branch ${eggroll_git_branch}"
  -  git clone ${eggroll_git_url} -b ${eggroll_git_branch} eggroll
  -  echo $(ls)
  - nohup python fate_flow/fate_flow_client.py > fate_flow_start.log &
  - cat fate_flow_start.log
  - coverage run federatedml/util/consts.py
  - cur_dir=$(pwd)
  - run_test() {
      file=$1
      echo "start to run test "$file
      coverage run -a $file
    }

    traverse_folder() {
      for file in $(ls ${1});
      do
        file_fullname=$1/$file
        if [ -d $file_fullname ]; then
          traverse_folder $file_fullname
        elif [[ $file =~ _test.py$ ]] && [[ $1 =~ /test$ ]]; then
          run_test $file_fullname
        fi
      done
    }
    traverse_folder $cur_dir/..
after_success:
  - codecov -t 8765aaaf-817b-44e1-a23e-e1dce50e1b29
